name: wms_mobile
description: Warehouse Management System - Mobile App

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.6.3

  # Local database (SQLite)
  drift: ^2.23.1
  sqlite3_flutter_libs: ^0.5.29
  path_provider: ^2.1.4
  path: ^1.9.0

  # HTTP client
  dio: ^5.7.0

  # Secure storage (JWT token)
  flutter_secure_storage: ^9.2.4

  # Barcode scanner
  mobile_scanner: ^6.0.10

  # OCR (on-device)
  google_mlkit_text_recognition: ^0.14.0

  # Image picker (for memo OCR)
  image_picker: ^1.1.2

  # Excel parsing (inventory import on device)
  excel: ^4.0.6

  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.2
  connectivity_plus: ^6.1.4

  cupertino_icons: ^1.0.8
  camera: ^0.12.0+1
  google_mlkit_barcode_scanning: ^0.13.0
  google_generative_ai: ^0.4.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # Code generation
  drift_dev: ^2.23.1
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.1

flutter:
  uses-material-design: true

